<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Page</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-content: center;
			padding: 2rem;
			font-family: "Georgia", "Times New Roman", serif;
			color: #1f2937;
			background:
				radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.65), transparent 45%),
				radial-gradient(circle at 80% 10%, rgba(255, 240, 220, 0.5), transparent 40%),
				linear-gradient(135deg, #dbeafe 0%, #fef3c7 50%, #fce7f3 100%);
		}

		h1,
		p,
		h2,
		ul {
			max-width: 48ch;
			margin: 0 auto;
			text-align: center;
		}

		h1 {
			margin-bottom: 0.75rem;
			font-size: clamp(2rem, 5vw, 3rem);
		}

		p {
			margin-bottom: 1.5rem;
			line-height: 1.7;
			font-size: clamp(1rem, 2.4vw, 1.15rem);
		}

		h2 {
			font-size: 1.15rem;
			margin-bottom: 0.75rem;
		}

		ul {
			list-style: none;
			padding: 0;
			display: grid;
			gap: 0.6rem;
		}

		a {
			color: #0f4c81;
			font-weight: 600;
			text-decoration: none;
			background: rgba(255, 255, 255, 0.55);
			padding: 0.5rem 0.8rem;
			border-radius: 999px;
			display: inline-block;
			transition: transform 140ms ease, background-color 140ms ease;
		}

		a:hover {
			transform: translateY(-1px);
			background: rgba(255, 255, 255, 0.82);
		}
	</style>
</head>
<body>
	<h1>Simple Title</h1>
	<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>

	<h2>Useful Links</h2>
	<ul>
		<li><a href="https://example.com" target="_blank" rel="noopener noreferrer">Example Website</a></li>
		<li><a href="https://developer.mozilla.org" target="_blank" rel="noopener noreferrer">MDN Web Docs</a></li>
		<li><a href="#">Add Your Link Here</a></li>
	</ul>
</body>
</html>
